<!-- main -->
<section class="p-5 mt-5">
    <div class="container">
        <div class="row align-items-center">

                <h2>Contact with me</h2>

<!-- form  -->
<section class="p-5">
    <div class="container">
        <div class="row justify-content-center">

            <div class="col-lg-6">
                <form class="bg-light shadow p-4">

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label" for="name">Name</label>
                            <input type="text" id="name" class="form-control" placeholder="Enter your name">
                            <div class="text-danger" id="errorname"></div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label" for="email">Email</label>
                            <input type="text" id="email" class="form-control" placeholder="Enter your email">
                            <div class="text-danger" id="erroremail"></div>
                        </div>
                    </div>

                    <div class="mt-3">
                        <label class="form-label" for="message">Message</label>
                        <textarea id="message" class="form-control" rows="5" placeholder="Enter your message"></textarea>
                        <div class="text-danger" id="errormessage"></div>
                    </div>

                    <button type="button" class="btn btn-outline-warning mt-3 w-100" onclick="validation()">
                        Send Message
                    </button>

                </form>
            </div>

        </div>
